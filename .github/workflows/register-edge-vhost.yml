name: Register edge vhost (Cloudflare + wslproxy)

# Make a Ring Promoter instance publicly reachable through the wslproxy edge —
# the same two edge steps the training deploy uses for ring-promoter.fictionally.org,
# factored out so any instance (workstation, and more later) can register its host
# on pop0 without a full redeploy. The Ring Promoter Deployment/Service/Ingress are
# assumed already applied in-cluster; this only wires up DNS + the pop0 vhost.
#
# Steps:
#   1. Cloudflare CNAME  <host> -> pop0.wslproxy.com   (idempotent; soft-skips
#      without CF_API_TOKEN — external-dns normally maintains this already).
#   2. wslproxy vhost (pop0) for <host> via the admin API, from the checked-in
#      server spec. Until this exists the edge answers "Host not configured".
#   3. Verify https://<host>/healthz returns 200 with a JSON body.
#
# Secrets (already configured on this repo, shared with the training deploy):
#   WSLPROXY_USER / WSLPROXY_PASSWORD / WSLPROXY_GATEWAY_URL   wslproxy admin API
#   CF_API_TOKEN   (optional) Cloudflare token that can edit the host's zone

on:
  workflow_dispatch:
    inputs:
      host:
        description: "Public host to register (FQDN)"
        required: true
        default: rp.workstation.co.uk
      zone:
        description: "Cloudflare zone the host lives in"
        required: true
        default: workstation.co.uk
      server_spec:
        description: "Path to the wslproxy server spec JSON"
        required: true
        default: deploy/instances/workstation/wslproxy-server.json

env:
  CNAME_TARGET: pop0.wslproxy.com

jobs:
  register:
    name: Register ${{ inputs.host }} on the edge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure Cloudflare CNAME -> pop0
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          HOST: ${{ inputs.host }}
          ZONE: ${{ inputs.zone }}
        run: |
          set -euo pipefail
          # DNS is normally maintained by external-dns from the Ingress
          # annotations; this is an idempotent belt-and-suspenders and soft-skips
          # when no token is configured or the zone is not on this account.
          if [ -z "${CF_API_TOKEN:-}" ]; then
            echo "::notice::CF_API_TOKEN not set — relying on external-dns / existing DNS for ${HOST} -> ${CNAME_TARGET}."
            exit 0
          fi
          api="https://api.cloudflare.com/client/v4"
          auth=(-H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json")
          zone_id=$(curl -fsS "${auth[@]}" "$api/zones?name=${ZONE}" | jq -r '.result[0].id // empty')
          if [ -z "$zone_id" ]; then
            echo "::notice::zone ${ZONE} not found for this Cloudflare token — leaving DNS to external-dns."
            exit 0
          fi
          rec=$(curl -fsS "${auth[@]}" "$api/zones/$zone_id/dns_records?type=CNAME&name=${HOST}")
          rec_id=$(echo "$rec" | jq -r '.result[0].id // empty')
          body=$(jq -nc --arg name "$HOST" --arg content "$CNAME_TARGET" \
            '{type:"CNAME",name:$name,content:$content,ttl:1,proxied:false}')
          if [ -n "$rec_id" ]; then
            curl -fsS "${auth[@]}" -X PUT "$api/zones/$zone_id/dns_records/$rec_id" --data "$body" >/dev/null
            echo "updated CNAME ${HOST} -> ${CNAME_TARGET}"
          else
            curl -fsS "${auth[@]}" -X POST "$api/zones/$zone_id/dns_records" --data "$body" >/dev/null
            echo "created CNAME ${HOST} -> ${CNAME_TARGET}"
          fi

      - name: Register wslproxy vhost (pop0)
        env:
          WSLPROXY_USER: ${{ secrets.WSLPROXY_USER }}
          WSLPROXY_PASSWORD: ${{ secrets.WSLPROXY_PASSWORD }}
          WSLPROXY_GATEWAY_URL: ${{ secrets.WSLPROXY_GATEWAY_URL }}
          HOST: ${{ inputs.host }}
          SPEC: ${{ inputs.server_spec }}
        run: |
          set -euo pipefail
          if [ -z "${WSLPROXY_USER:-}" ] || [ -z "${WSLPROXY_PASSWORD:-}" ] || [ -z "${WSLPROXY_GATEWAY_URL:-}" ]; then
            echo "::error::WSLPROXY_USER / WSLPROXY_PASSWORD / WSLPROXY_GATEWAY_URL must all be set."
            exit 1
          fi
          if [ ! -f "$SPEC" ]; then
            echo "::error::server spec not found: $SPEC"; exit 1
          fi
          # Guard: the spec's server_name must match the host we are registering.
          spec_host=$(jq -r '.server_name' "$SPEC")
          if [ "$spec_host" != "$HOST" ]; then
            echo "::error::spec server_name ($spec_host) != host ($HOST)"; exit 1
          fi
          GW="$WSLPROXY_GATEWAY_URL"
          # 1) Login (email + password) -> JWT accessToken (as api-scripts/auth/login.sh).
          TOKEN=$(curl -fsS -X POST "$GW/api/user/login" \
            -H "Content-Type: application/json" \
            -d "$(jq -nc --arg e "$WSLPROXY_USER" --arg p "$WSLPROXY_PASSWORD" '{email:$e,password:$p}')" \
            | jq -r '.data.accessToken')
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::wslproxy login failed for ${WSLPROXY_USER} at ${GW}."; exit 1
          fi
          # 2) Idempotent upsert: skip if a server for HOST already exists.
          existing=$(curl -fsS -X GET "$GW/api/servers" -H "Authorization: Bearer $TOKEN" \
            | jq -r --arg h "$HOST" '.data[]? | select(.server_name==$h) | .id' | head -1)
          if [ -n "$existing" ]; then
            echo "wslproxy vhost for ${HOST} already exists (id=$existing) — nothing to do."
            exit 0
          fi
          # 3) Create the vhost from the checked-in spec.
          resp=$(curl -fsS -X POST "$GW/api/servers" \
            -H "Authorization: Bearer $TOKEN" -H "Content-Type: application/json" \
            -d @"$SPEC")
          sid=$(echo "$resp" | jq -r '.data.id // empty')
          if [ -z "$sid" ]; then
            echo "::error::wslproxy server create failed: $resp"; exit 1
          fi
          echo "registered wslproxy vhost ${HOST} (id=$sid)."

      - name: Verify public health
        env:
          HOST: ${{ inputs.host }}
        run: |
          set -euo pipefail
          # pop0 picks up the new vhost within ~1 min via its config-sync cron.
          for i in $(seq 1 20); do
            code=$(curl -sS -o /tmp/body -m 10 -w '%{http_code}' "https://${HOST}/healthz" || echo 000)
            body=$(head -c 120 /tmp/body | tr -d '\n')
            echo "[$i] https://${HOST}/healthz -> $code :: $body"
            if [ "$code" = "200" ] && ! grep -qi 'Host not configured' /tmp/body; then
              echo "✅ ${HOST} is live through the edge."; exit 0
            fi
            sleep 15
          done
          echo "::error::${HOST} did not become healthy through the edge in time."; exit 1
