name: Deploy training instance (fictionally.org)

# Builds and deploys the TRAINING Ring Promoter instance
# (ring-promoter.fictionally.org) to k3s1 on every push to main, and automates
# its edge wiring end to end:
#
#   1. build + push the image, apply the instance manifests, roll out
#   2. ensure the Cloudflare CNAME  ring-promoter.fictionally.org -> pop0.wslproxy.com
#   3. trigger the wslproxy vhost registration for the host on the pop0 edge
#   4. verify in-cluster, then verify the public URL
#
# This workflow owns the TRAINING instance ONLY:
#   namespace fictionally-ring-promoter, https://ring-promoter.fictionally.org
# It never touches workstation-ring-promoter or ring-system.
#
# One-time bootstrap (CI never creates secrets): create the Postgres DB/role
# `ringpromoter_training` and the Secret `ring-promoter` in the namespace — see
# deploy/instances/fictionally/README.md.
#
# Repo secrets used:
#   KUBE_CONFIG_DATA_K3S1  base64 kubeconfig for k3s1 (shared with the other deploy)
#   DOCKER_USER / DOCKER_PASSWD   Docker Hub push
#   CF_API_TOKEN           Cloudflare token with DNS:Edit on the fictionally.org zone
#   WSLPROXY_DISPATCH_TOKEN (optional) PAT to dispatch the wslproxy register workflow

on:
  push:
    branches: [main]
    paths:
      - "training/config/**"
      - "deploy/instances/fictionally/**"
      - ".github/workflows/deploy-training-k3s1.yml"
      - "cmd/**"
      - "internal/**"
      - "web/**"
      - "Dockerfile"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: sha-<short>)"
        required: false
        default: ""

concurrency:
  group: deploy-training-k3s1
  cancel-in-progress: false

env:
  IMAGE: docker.io/bwalia/ring-promoter
  NAMESPACE: fictionally-ring-promoter
  HOST: ring-promoter.fictionally.org
  ZONE: fictionally.org
  CNAME_TARGET: pop0.wslproxy.com
  HEALTH_URL: https://ring-promoter.fictionally.org/healthz

jobs:
  test:
    name: Test
    runs-on: [self-hosted, mac-studio]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - run: go vet ./...
      - run: go test ./...
      # Fail fast if the training config no longer validates.
      - name: Validate training config
        run: |
          set -euo pipefail
          RP_API_TOKEN=ci RP_DB_DRIVER=memory RP_HEALTH=http \
          RP_GITHUB_TOKEN=ci RP_JIRA_TOKEN=ci RP_LISTEN_ADDR=:18190 \
          timeout 10 go run ./cmd/ringpromoter -config training/config/apps.training.yaml &
          sleep 5
          curl -fsS -H "Authorization: Bearer ci" http://127.0.0.1:18190/api/apps | grep -q '"operator"'
          echo "training config validates (7 apps registered)."

  deploy:
    name: Build & deploy training instance
    needs: test
    runs-on: [self-hosted, mac-studio]
    steps:
      - uses: actions/checkout@v4

      - name: Compute build metadata
        run: |
          echo "SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWD }}
      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=sha-${{ env.SHORT_SHA }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ env.BUILD_TIME }}

      - name: Configure kubeconfig (k3s1)
        run: |
          umask 077
          echo "${{ secrets.KUBE_CONFIG_DATA_K3S1 }}" | base64 -d > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Preflight (namespaces exist + Secret present with required keys)
        run: |
          set -euo pipefail
          kubectl get nodes -o wide
          kubectl apply -f deploy/instances/fictionally/namespace.yaml
          if ! kubectl -n "${NAMESPACE}" get secret ring-promoter >/dev/null 2>&1; then
            echo "::error::secret/ring-promoter missing in ${NAMESPACE}. Bootstrap it first (see deploy/instances/fictionally/README.md). CI never creates secrets."
            exit 1
          fi
          # The training config uses the github (operator) and jira (bank-api)
          # backends, whose deployers/validators are built at boot — the pod
          # crash-loops if these keys are absent. They may be dummy values until
          # you actually promote operator / bank-api.
          for k in RP_API_TOKEN RP_DB_DSN RP_GITHUB_TOKEN RP_JIRA_TOKEN; do
            if ! kubectl -n "${NAMESPACE}" get secret ring-promoter -o jsonpath="{.data.$k}" | grep -q .; then
              echo "::error::secret/ring-promoter is missing key $k (dummy is fine to boot). See the runbook."
              exit 1
            fi
          done
          echo "preflight ok."

      - name: Apply RBAC + config + manifests (GitOps; never secret.yaml)
        run: |
          set -euo pipefail
          kubectl apply -f deploy/instances/fictionally/rbac.yaml
          # ConfigMap is generated from the single-source training config (no dup).
          kubectl -n "${NAMESPACE}" create configmap ring-promoter-config \
            --from-file=config.yaml=training/config/apps.training.yaml \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply \
            -f deploy/instances/fictionally/service.yaml \
            -f deploy/instances/fictionally/ingress.yaml

      - name: Roll out image
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="sha-${SHORT_SHA}"; fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "Deploying ${IMAGE}:${TAG}"
          sed "s#image: docker.io/bwalia/ring-promoter:.*#image: ${IMAGE}:${TAG}#" \
            deploy/instances/fictionally/deployment.yaml | kubectl apply -f -

      - name: Restart to pick up config, and wait
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" rollout restart deploy/ring-promoter
          kubectl -n "${NAMESPACE}" rollout status deploy/ring-promoter --timeout=180s

      - name: Ensure Cloudflare CNAME -> pop0
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CF_API_TOKEN:-}" ]; then
            echo "::error::CF_API_TOKEN not set — cannot manage DNS. Add a Cloudflare token with DNS:Edit on ${ZONE}."
            exit 1
          fi
          api="https://api.cloudflare.com/client/v4"
          auth=(-H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json")
          zone_id=$(curl -fsS "${auth[@]}" "$api/zones?name=${ZONE}" | jq -r '.result[0].id')
          if [ -z "$zone_id" ] || [ "$zone_id" = "null" ]; then
            echo "::error::zone ${ZONE} not found for this Cloudflare token."; exit 1
          fi
          # Idempotent upsert: CNAME HOST -> pop0.wslproxy.com, unproxied.
          rec=$(curl -fsS "${auth[@]}" "$api/zones/$zone_id/dns_records?type=CNAME&name=${HOST}")
          rec_id=$(echo "$rec" | jq -r '.result[0].id // empty')
          body=$(jq -nc --arg name "$HOST" --arg content "$CNAME_TARGET" \
            '{type:"CNAME",name:$name,content:$content,ttl:1,proxied:false}')
          if [ -n "$rec_id" ]; then
            curl -fsS "${auth[@]}" -X PUT "$api/zones/$zone_id/dns_records/$rec_id" --data "$body" >/dev/null
            echo "updated CNAME ${HOST} -> ${CNAME_TARGET}"
          else
            curl -fsS "${auth[@]}" -X POST "$api/zones/$zone_id/dns_records" --data "$body" >/dev/null
            echo "created CNAME ${HOST} -> ${CNAME_TARGET}"
          fi

      - name: Register wslproxy vhost (pop0)
        env:
          WSLPROXY_DISPATCH_TOKEN: ${{ secrets.WSLPROXY_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${WSLPROXY_DISPATCH_TOKEN:-}" ]; then
            echo "::warning::WSLPROXY_DISPATCH_TOKEN not set — skipping automated wslproxy registration."
            echo "::warning::Register ${HOST} on pop0 manually (see deploy/instances/fictionally/wslproxy-vhost.md)."
            exit 0
          fi
          # Dispatch the wslproxy repo's register-domains workflow to add/activate
          # the vhost for HOST on the pop0 edge, backed by the k3s1 Traefik
          # addresses. Adjust the repo / workflow / inputs to your wslproxy setup.
          curl -fsS -X POST \
            -H "Authorization: Bearer ${WSLPROXY_DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/bwalia/wslproxy/actions/workflows/wslproxy-register-domains.yml/dispatches \
            -d "$(jq -nc --arg host "$HOST" '{ref:"main",inputs:{domains:$host,pop:"pop0",environment:"prod"}}')"
          echo "dispatched wslproxy-register-domains for ${HOST} (watch it in bwalia/wslproxy)."

      - name: Verify in-cluster
        run: |
          set -euo pipefail
          kubectl -n "${NAMESPACE}" port-forward svc/ring-promoter 18080:80 >/dev/null 2>&1 &
          PF_PID=$!; trap 'kill "$PF_PID" 2>/dev/null || true' EXIT
          sleep 3
          for i in $(seq 1 10); do
            code=$(curl -s -o "$RUNNER_TEMP/in.out" -w '%{http_code}' --max-time 5 http://127.0.0.1:18080/healthz || echo 000)
            body=$(cat "$RUNNER_TEMP/in.out" 2>/dev/null || true)
            echo "in-cluster healthz attempt $i -> code=$code body=$body"
            if [ "$code" = "200" ] && printf '%s' "$body" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
              echo "training Ring Promoter serving in-cluster."; exit 0
            fi
            sleep 3
          done
          echo "::error::pod did not serve {\"status\":\"ok\"} after rollout"; exit 1

      - name: Post-deploy health check (public URL)
        run: |
          set -euo pipefail
          # Assert the BODY: the pop0 edge answers 200 with "Host not configured"
          # for unknown hosts, so a code-only check would pass with nothing wired.
          for i in $(seq 1 18); do
            code=$(curl -sL -o "$RUNNER_TEMP/healthz.out" -w '%{http_code}' --max-time 15 "${HEALTH_URL}" || echo 000)
            body=$(cat "$RUNNER_TEMP/healthz.out" 2>/dev/null || true)
            echo "public healthz attempt $i -> code=$code"
            if [ "$code" = "200" ] && printf '%s' "$body" | grep -q '"status"[[:space:]]*:[[:space:]]*"ok"'; then
              echo "training Ring Promoter healthy at ${HEALTH_URL}."; exit 0
            fi
            sleep 5
          done
          if printf '%s' "$body" | grep -q "Host not configured"; then
            echo "::error::${HEALTH_URL} is the wslproxy \"Host not configured\" page — the vhost isn't active yet."
            echo "::error::DNS + deploy are fine (in-cluster check passed). Ensure the wslproxy vhost for ${HOST} is registered on pop0 (see the register step / wslproxy-vhost.md)."
            exit 1
          fi
          echo "::error::${HEALTH_URL} did not report {\"status\":\"ok\"} (last code=$code) — DNS may still be propagating."
          exit 1
