name: Seed Core Platform demo apps (fictionally.org)

# One-shot seeding of the five INERT "Core Platform" demo apps registered in
# training/config/apps.training.yaml (api-gateway, identity-service,
# billing-engine, data-pipeline, notification-service) on the live training
# instance. They use the `log` deployer, so nothing is deployed anywhere —
# this only writes state/history so the UI shows a realistic pipeline:
# an older stable version in prod/acc, a newer one in test, the newest in int.
# It also creates the "Core Platform" group if it does not exist yet.
#
# MANUAL only (workflow_dispatch). Safe to re-run: the fill sequence is
# deterministic (same final versions, extra history entries), and the group is
# only created when missing.
#
# Repo secrets used:
#   RP_URL     base URL of the training instance (no trailing /)
#   RP_TOKEN   bearer token for the training instance /api

on:
  workflow_dispatch:
    inputs:
      prod_password:
        description: "RP_PROD_PASSWORD of the instance (only needed if production is password-protected; without it the prod hop 403s and is skipped with a warning)"
        required: false
        default: ""

concurrency:
  group: seed-core-platform
  cancel-in-progress: false

jobs:
  seed:
    name: Seed versions + group
    runs-on: [self-hosted, mac-studio]
    steps:
      - name: Seed version spread via Ring Promoter API
        env:
          RP_URL: ${{ secrets.RP_URL }}
          RP_TOKEN: ${{ secrets.RP_TOKEN }}
          PROD_PASSWORD: ${{ github.event.inputs.prod_password }}
        run: |
          set -uo pipefail

          post() { # path json
            curl -sS -X POST "$RP_URL$1" \
              -H "Authorization: Bearer $RP_TOKEN" \
              -H 'Content-Type: application/json' \
              -d "$2" || echo "::warning::POST $1 failed"
            echo
          }

          seed() { # app version
            echo "seed $1 int -> $2"
            post "/api/apps/$1/seed" "$(printf '{"ring":"int","version":"%s"}' "$2")"
          }
          promote() { # app from_ring  (password rides along; ignored unless the
                      # target is the protected last ring)
            echo "promote $1 from $2"
            post "/api/apps/$1/promote" \
              "$(printf '{"from_ring":"%s","password":"%s"}' "$2" "$PROD_PASSWORD")"
          }

          fill() { # app v_old v_mid v_new -> prod/acc=v_old test=v_mid int=v_new
            seed "$1" "$2"
            promote "$1" int
            promote "$1" test
            promote "$1" acc
            seed "$1" "$3"
            promote "$1" int
            seed "$1" "$4"
          }

          fill api-gateway          3.8.2  3.9.0  3.9.1
          fill identity-service     5.2.7  5.3.0  5.3.1
          fill billing-engine       2.14.3 2.15.0 2.16.0
          fill data-pipeline        1.22.4 1.23.0 1.24.0
          fill notification-service 4.6.1  4.7.0  4.7.2

      - name: Ensure the "Core Platform" group exists
        env:
          RP_URL: ${{ secrets.RP_URL }}
          RP_TOKEN: ${{ secrets.RP_TOKEN }}
        run: |
          set -uo pipefail
          if curl -sS -H "Authorization: Bearer $RP_TOKEN" "$RP_URL/api/groups" \
              | grep -q '"Core Platform"'; then
            echo "group already exists — nothing to do."
            exit 0
          fi
          curl -sS -X POST "$RP_URL/api/groups" \
            -H "Authorization: Bearer $RP_TOKEN" \
            -H 'Content-Type: application/json' \
            -d '{"name":"Core Platform","apps":["api-gateway","identity-service","billing-engine","data-pipeline","notification-service"]}' \
            || echo "::warning::group creation failed"
