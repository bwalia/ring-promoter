<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ring Promoter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Login gate -->
  <div id="gate" class="gate">
    <form id="gate-form" class="gate-card">
      <div class="gate-logo">◎</div>
      <h1>Ring Promoter</h1>
      <p class="muted">Enter your API token to continue.</p>
      <input id="gate-token" type="password" placeholder="API token" autocomplete="off" />
      <button type="submit" class="btn btn-primary">Unlock</button>
      <div id="gate-error" class="gate-error" hidden></div>
    </form>
  </div>

  <!-- App -->
  <div id="app-root" hidden>
    <header class="topbar">
      <div class="brand"><span class="brand-mark">◎</span> Ring Promoter</div>
      <div class="topbar-right">
        <label class="app-picker">
          <span class="muted">App</span>
          <select id="app"></select>
        </label>
        <button id="refresh" class="btn btn-ghost" title="Refresh">↻ Refresh</button>
        <button id="signout" class="btn btn-ghost">Sign out</button>
      </div>
    </header>

    <main>
      <div id="toast" class="toast" hidden></div>

      <!-- Summary status cards -->
      <section id="summary" class="summary"></section>

      <!-- Live deployment progress (injected when a job runs) -->
      <section id="progress-wrap"></section>

      <!-- Pipeline -->
      <section class="panel">
        <div class="panel-head">
          <h2>Pipeline</h2>
          <span class="muted" id="pipeline-sub"></span>
        </div>
        <div id="pipeline" class="pipeline"></div>
      </section>

      <!-- Activity / history -->
      <section class="panel">
        <div class="panel-head"><h2>Activity</h2></div>
        <div id="history" class="history"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
