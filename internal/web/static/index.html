<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ring Promoter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Login gate: shown until a valid API token is entered -->
  <div id="gate" class="gate">
    <form id="gate-form" class="gate-card">
      <h1>Ring Promoter</h1>
      <p class="muted">Enter your API token to continue.</p>
      <input id="gate-token" type="password" placeholder="API token" autocomplete="off" />
      <button type="submit" class="primary">Unlock</button>
      <div id="gate-error" class="gate-error" hidden></div>
    </form>
  </div>

  <!-- App: hidden until authenticated -->
  <div id="app-root" hidden>
    <header>
      <h1>Ring Promoter</h1>
      <button id="signout">Sign out</button>
    </header>

    <main>
      <section class="controls">
        <label for="app">Application</label>
        <select id="app"></select>
        <button id="refresh">Refresh</button>
      </section>

      <div id="feedback" class="feedback" hidden></div>

      <section>
        <h2>Rings</h2>
        <table id="rings">
          <thead>
            <tr>
              <th>Ring</th>
              <th>Current</th>
              <th>Live</th>
              <th>Previous</th>
              <th>Health</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

      <section>
        <h2>History</h2>
        <table id="history">
          <thead>
            <tr>
              <th>When</th>
              <th>Ring</th>
              <th>Action</th>
              <th>From → To</th>
              <th>Result</th>
              <th>Message</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
