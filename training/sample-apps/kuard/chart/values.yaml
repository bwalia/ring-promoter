# Default values for the kuard chart. Per-ring overrides (namespace, host,
# replicas) come from Ring Promoter / a values-<ring>.yaml at deploy time.

replicaCount: 2

image:
  # Upstream, third-party KUARD demo image — we build NOTHING for this app.
  repository: gcr.io/kuar-demo/kuard-amd64
  # tag defaults to Chart.appVersion (blue); Ring Promoter flips it between the
  # blue and green tags on every deploy (kubectl set image / --set image.tag=...).
  # kuard has no version field, so the tag is the only "version" that exists.
  tag: blue
  pullPolicy: IfNotPresent

service:
  port: 80
  # kuard listens on 8080 by default.
  targetPort: 8080

ingress:
  enabled: true
  # k3s1's in-cluster ingress controller.
  className: traefik
  # Public zone; the app is reachable at <name>.<domain>.
  domain: fictionally.org
  # Override to pin an exact host; empty = <chart name>.<domain>.
  host: ""
  # external-dns creates a CNAME for `host` pointing at this POP target
  # (k3s1 sits behind the wslproxy edge; pop0 is the POP for these hosts).
  externalDnsTarget: pop0.wslproxy.com
  tls: false

# kuard does NOT expose a Prometheus /metrics endpoint, so scraping is off by
# default. Kept for chart consistency with the other training apps.
metrics:
  enabled: false
  path: /metrics
  port: 8080

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1
