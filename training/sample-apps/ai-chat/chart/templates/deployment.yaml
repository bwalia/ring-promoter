apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app.fullname" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app.labels" . | nindent 8 }}
      {{- if .Values.metrics.enabled }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: {{ .Values.metrics.path | quote }}
        prometheus.io/port: {{ .Values.metrics.port | quote }}
      {{- end }}
    spec:
      # Pod-level securityContext: distroless :nonroot images set USER to the
      # name "nonroot"; kubelet needs a NUMERIC uid to enforce runAsNonRoot.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.gpu.enabled }}
      # GPU scheduling (values.gpu.enabled=true). Pins pods to GPU nodes and
      # tolerates their taint. Disabled by default so the chart deploys anywhere.
      nodeSelector:
        {{- toYaml .Values.gpu.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.gpu.tolerations | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ include "app.name" . }}
          image: "{{ .Values.image.repository }}:{{ include "app.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          env:
            # Reported by /healthz so Ring Promoter can confirm the running
            # build actually matches the promoted version.
            - name: RP_VERSION
              value: {{ include "app.version" . | quote }}
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            # Ollama upstream for POST /chat. Empty url = canned offline reply.
            - name: OLLAMA_URL
              value: {{ .Values.ollama.url | quote }}
            - name: OLLAMA_MODEL
              value: {{ .Values.ollama.model | quote }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- if .Values.gpu.enabled }}
            # Merge the base resources with a GPU request/limit when enabled.
            requests:
              {{- toYaml .Values.resources.requests | nindent 14 }}
              {{ .Values.gpu.resource.name }}: {{ .Values.gpu.resource.count | quote }}
            limits:
              {{- toYaml .Values.resources.limits | nindent 14 }}
              {{ .Values.gpu.resource.name }}: {{ .Values.gpu.resource.count | quote }}
            {{- else }}
            {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
