{{- if .Values.secret.create -}}
# ---------------------------------------------------------------------------
# PLACEHOLDER Secret — TRAINING ONLY.
#
# The values below are deliberate PLACEHOLDERS ("change-me"). They exist so
# `helm template` / `helm install` are self-contained for int/test labs.
#
# NEVER commit real credentials here. In acc/prod:
#   - set `secret.create=false` and reference an existing Secret you manage
#     out-of-band (a SealedSecret or an external-secrets ExternalSecret), OR
#   - inject real values at deploy time from Ring Promoter's RP_* environment /
#     your secret store — never from a file in git.
#
# Ring Promoter's production password + change_request gate are what stop an
# unreviewed value from ever reaching prod; this Secret is only the transport.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app.secretName" . }}
  labels:
    {{- include "app.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Connection string for lib/pq. Points at the in-cluster training Postgres by
  # default; override for a managed database.
  DATABASE_URL: {{ .Values.secret.databaseUrl | quote }}
  # HS256 signing key for the JWTs issued by POST /login.
  JWT_SECRET: {{ .Values.secret.jwtSecret | quote }}
{{- end -}}
