# Default values for the bank-api chart. Per-ring overrides (namespace, host,
# replicas, secrets) come from Ring Promoter / a values-<ring>.yaml at deploy time.

replicaCount: 2

image:
  repository: ghcr.io/bwalia/rp-training-bank-api
  # tag defaults to Chart.appVersion; Ring Promoter sets it to the promoted
  # version on every deploy (kubectl set image / Helm --set image.tag=...).
  tag: ""
  pullPolicy: IfNotPresent

# version is passed to the container as RP_VERSION so /healthz echoes it.
# Empty = fall back to the image tag. Ring Promoter's version-aware health
# check (health_version_field: version) compares this against the deployed tag.
version: ""

service:
  port: 80
  targetPort: 8080

ingress:
  enabled: true
  # k3s1's in-cluster ingress controller.
  className: traefik
  # Public zone; the app is reachable at <name>.<domain>.
  domain: fictionally.org
  # Override to pin an exact host; empty = <chart name>.<domain>
  # (i.e. bank-api.fictionally.org).
  host: ""
  # external-dns creates a CNAME for `host` pointing at this POP target
  # (k3s1 sits behind the wslproxy edge; pop0 is the POP for these hosts).
  externalDnsTarget: pop0.wslproxy.com
  tls: false

# Prometheus scrape annotations on the pod (a scrape config or ServiceMonitor
# then collects /metrics).
metrics:
  enabled: true
  path: /metrics
  port: 8080

# ---------------------------------------------------------------------------
# Secrets. DATABASE_URL and JWT_SECRET are read from a Kubernetes Secret.
#
# The chart can render a Secret with PLACEHOLDER values (secret.create=true) so
# `helm template` is self-contained for training. NEVER commit real secrets:
# in a real ring these come from Ring Promoter's RP_* env / a SealedSecret /
# an external secret store, and you set secret.create=false to reference an
# existing Secret by name.
# ---------------------------------------------------------------------------
secret:
  # true  -> the chart renders templates/secret.yaml with the placeholder values
  #          below (fine for int/test labs only).
  # false -> reference an existing Secret named `secret.name` that you manage
  #          out-of-band (SealedSecret / external-secrets). Use this for acc/prod.
  create: true
  # Name of the Secret to create/reference. Empty = "<fullname>-secrets".
  name: ""
  # PLACEHOLDER values — change-me. Only used when create=true. Do NOT put real
  # credentials here; override at deploy time or use an existing Secret.
  databaseUrl: "postgres://bank:change-me@bank-api-postgres:5432/bank?sslmode=disable"
  jwtSecret: "change-me"

# ---------------------------------------------------------------------------
# Database migrations. Rendered as a Kubernetes Job (a Helm post-install/upgrade
# hook) that runs the app image with the "migrate" argument: it applies the
# migrations embedded in the binary (//go:embed db/migrations) against
# DATABASE_URL, then exits. Using the app image keeps ONE source of truth for
# the SQL (no ConfigMap copy to drift). See architecture.md for the rationale
# and the alternative RUN_MIGRATIONS=true boot path.
# ---------------------------------------------------------------------------
migrations:
  # The former pre-install/pre-upgrade Helm HOOK Job was removed: hooks run
  # BEFORE the chart's Secret + bundled Postgres exist, so it could never resolve
  # bank-api-secrets / reach the database and the release failed. Migrations now
  # run on boot inside the app pod instead (RUN_MIGRATIONS=true), which is
  # self-contained: the pod waits for its own Postgres and applies the idempotent
  # embedded migrations before serving.
  enabled: false
  # Run migrations on boot inside the app pod (RUN_MIGRATIONS=true).
  runOnBoot: true

# ---------------------------------------------------------------------------
# Ephemeral in-cluster PostgreSQL for TRAINING ONLY. Gated by postgres.enabled.
# Data is NOT persisted (emptyDir). In production set postgres.enabled=false and
# point DATABASE_URL at a managed database (RDS / Cloud SQL / Crunchy, ...).
# ---------------------------------------------------------------------------
postgres:
  enabled: true
  image: postgres:16-alpine
  # These seed the throwaway instance and MUST line up with secret.databaseUrl
  # above. Training placeholders only.
  db: bank
  user: bank
  password: change-me
  port: 5432
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1
