# Ring Promoter configuration (local-development defaults).
#
# Everything here can be overridden by environment variables (see README):
#   RP_LISTEN_ADDR, RP_API_TOKEN, RP_DEPLOYER, RP_HEALTH,
#   RP_DB_DRIVER, RP_DB_DSN, RP_RETRY_COUNT, RP_RETRY_DELAY
#
# In production the `apps` block is mounted from a ConfigMap and secrets
# (api_token, database.dsn) come from a Secret via environment variables.

listen_addr: ":8080"

# For local dev only. In production leave this unset and provide RP_API_TOKEN
# from a Kubernetes Secret.
api_token: "local-dev-token"

# Backends. Local dev uses the no-op deployer + always-healthy checker + memory
# store so the whole thing runs without a cluster or database.
deployer: log     # log | kubectl
health: always    # always | http

retry:
  count: 3        # health-check attempts after the first, before rolling back
                  # (0 is valid and means: one check, no retries)
  delay: 5s       # wait between attempts

# Max time for a single seed/promote/rollback end-to-end (deploy + rollout wait
# + health retries + any auto-rollback). Runs detached from the HTTP request so
# a client disconnect can't abort a rollback.
operation_timeout: 10m

database:
  driver: memory  # memory | postgres
  # dsn: "postgres://ringpromoter:secret@postgres:5432/ringpromoter?sslmode=disable"

# AI failure diagnosis (optional). When a seed/promote/rollback fails, the UI
# offers "Diagnose with AI": the failure logs go to this Ollama server, which
# explains the cause in simple language and suggests fixes. The feature stays
# OFF until the JWT secret is also set — provide it via RP_OLLAMA_JWT_SECRET
# (or `jwt_secret` here for local experiments; never commit a real secret).
ollama:
  url: "https://ollama.workstation.co.uk"
  model: "qwen3-coder:30b"

# ---------------------------------------------------------------------------
# Application registry. Add a new managed app by adding an entry here — no code
# change and no rebuild required (edit the ConfigMap in k3s).
#
# Optional per-ring version verification: a URL answering "200 OK" can still
# be the OLD version right after a deploy. If the app's health endpoint reports
# its running version, set ONE of these on the ring and every post-deploy check
# will also require the reported version to equal the version just deployed
# (mismatch -> failed check -> auto-rollback):
#   health_version_field:  "version"        # JSON body field ({"version":"v1"});
#                                           # dotted path ok, e.g. "build.version"
#   health_version_header: "X-App-Version"  # or a response header
# The endpoint must report the exact deployed version string (image tag /
# branch). Leave both unset to keep the plain status-only check.
#
# The only app is wslproxy. In PRODUCTION it deploys via its own GitHub Actions
# per-environment workflow using the per-app "github" deployer — see the copy in
# deploy/k8s/configmap.yaml. Here (local dev) it deliberately has NO per-app
# deployer override, so it uses the global `deployer: log` above and runs
# offline: seed/promote/rollback exercise the UI + memory store without touching
# a real cluster or dispatching a workflow (which would need RP_GITHUB_TOKEN).
# ---------------------------------------------------------------------------
apps:
  - name: wslproxy
    display_name: "diytaxreturn proxy"
    rings:
      int:  { target_env: int,  health_url: "https://int-our.wslproxy.com/healthz" }
      test: { target_env: test, health_url: "https://test.wslproxy.com/healthz" }
      acc:  { target_env: acc,  health_url: "https://prod-our-v1.wslproxy.com/healthz" }  # pop0
      prod: { target_env: prod, health_url: "https://pop1.diytaxreturn.co.uk/healthz" }   # pop1

  # spectoncr — in-cluster container registry. In PRODUCTION it deploys via its
  # Helm-chart GitHub Actions workflow (deploy-spectoncr.yml in diy-tax-return-uk)
  # using the per-app "github" deployer — see the copy in deploy/k8s/configmap.yaml.
  # Here (local dev) it has NO per-app deployer, so it uses the global
  # `deployer: log` above and runs offline without dispatching a workflow.
  # A healthy spectoncr answers GET /v2/ with 401 (basic-auth at the edge), so
  # its rings pin health_expect_status: 401 instead of the default "any 2xx".
  - name: spectoncr
    display_name: "diytaxreturn registry"
    rings:
      int:  { target_env: int,  health_url: "https://int-spectoncr.diytaxreturn.co.uk/v2/",  health_expect_status: 401 }
      test: { target_env: test, health_url: "https://test-spectoncr.diytaxreturn.co.uk/v2/", health_expect_status: 401 }
      acc:  { target_env: acc,  health_url: "https://acc-spectoncr.diytaxreturn.co.uk/v2/",  health_expect_status: 401 }
      prod: { target_env: prod, health_url: "https://spectoncr.diytaxreturn.co.uk/v2/",      health_expect_status: 401 }
