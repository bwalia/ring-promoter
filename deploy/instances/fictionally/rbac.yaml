# RBAC for the TRAINING instance's control plane.
#
# Unlike the workstation instance (deployer: log, no RBAC), the training
# instance really deploys: it patches Deployments across the <app>-<ring>
# namespaces (kubectl deployer) and creates Jobs in ring-exec (k8sjob deployer).
#
# For a dedicated TRAINING cluster this grants the control-plane ServiceAccount
# deployment-patch cluster-wide for convenience. In production scope it per
# namespace with RoleBindings instead (least privilege).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ring-promoter-training
  namespace: fictionally-ring-promoter
---
# Roll application versions out: patch Deployments, read rollout status.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ring-promoter-training-deployer
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ring-promoter-training-deployer
subjects:
  - kind: ServiceAccount
    name: ring-promoter-training
    namespace: fictionally-ring-promoter
roleRef:
  kind: ClusterRole
  name: ring-promoter-training-deployer
  apiGroup: rbac.authorization.k8s.io
---
# k8sjob deployer (image-proc): manage Jobs + read pod logs, in ring-exec only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ring-promoter-training-executor
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ring-promoter-training-executor
  namespace: ring-exec
subjects:
  - kind: ServiceAccount
    name: ring-promoter-training
    namespace: fictionally-ring-promoter
roleRef:
  kind: ClusterRole
  name: ring-promoter-training-executor
  apiGroup: rbac.authorization.k8s.io
---
# Identity the k8sjob deploy pods run as (k8sjob service_account: ring-deploy-job).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ring-deploy-job
  namespace: ring-exec
