# Secrets for the training instance.
#
# PLACEHOLDER — fake values, for reference only. NEVER commit real secrets and
# do NOT `kubectl apply` this file as-is. Create the real Secret by hand or via
# a sealed-secret / external secret manager (see README).
apiVersion: v1
kind: Secret
metadata:
  name: ring-promoter
  namespace: fictionally-ring-promoter
type: Opaque
stringData:
  RP_API_TOKEN: "change-me-to-a-long-random-token"
  RP_DB_DSN: "postgres://ringpromoter_training:change-me@ring-promoter-db.ring-system.svc.cluster.local:5432/ringpromoter_training?sslmode=require"
  # github deployer (operator): fine-grained PAT / App token with
  # actions:write + contents:read on bwalia/rp-training-operator.
  RP_GITHUB_TOKEN: "change-me-github-token"
  # change-request (JIRA) gate (bank-api): JIRA Cloud API token for the
  # configured email.
  RP_JIRA_TOKEN: "change-me-jira-api-token"
  # Extra production password (bank-api / any prod deploy). Omit to disable.
  RP_PROD_PASSWORD: "change-me-production-password"
  # Enables AI failure diagnosis — must match the Ollama gateway secret. Omit
  # (do not set a placeholder) to keep the feature disabled.
  # RP_OLLAMA_JWT_SECRET: "the-real-ollama-gateway-secret"
