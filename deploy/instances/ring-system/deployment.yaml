# Source manifest for the standalone "core" Ring Promoter instance in the
# ring-system namespace on k3s1.
#
# Unlike the fictionally/workstation instances, this one is NOT driven by the
# deploy-k3s1.yml workflow or a Helm release — it is applied by hand with
# `kubectl apply -f`. It previously floated on the mutable `:latest` tag with
# imagePullPolicy: IfNotPresent, which meant nodes kept serving a stale cached
# image and the instance silently missed new builds (e.g. the /metrics feature).
#
# It is now pinned to an immutable `sha-<shortsha>` tag so re-applying this file
# is deterministic and always rolls the intended build. Bump the tag below when
# promoting a new build, then: kubectl apply -f deploy/instances/ring-system/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ring-promoter
  namespace: ring-system
  labels:
    app: ring-promoter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ring-promoter
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        ring-promoter/config-revision: "1"
      labels:
        app: ring-promoter
    spec:
      serviceAccountName: ring-promoter
      securityContext:
        fsGroup: 65532
        runAsGroup: 65532
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ring-promoter
          image: docker.io/bwalia/ring-promoter:sha-dad89a8
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: RP_CONFIG_FILE
              value: /etc/ringpromoter/config.yaml
            - name: RP_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ring-promoter
                  key: RP_API_TOKEN
            - name: RP_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: ring-promoter
                  key: RP_DB_DSN
            - name: RP_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ring-promoter
                  key: RP_GITHUB_TOKEN
                  optional: true
            - name: RP_PROD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ring-promoter
                  key: RP_PROD_PASSWORD
                  optional: true
            - name: RP_OLLAMA_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: ring-promoter
                  key: RP_OLLAMA_JWT_SECRET
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: config
              mountPath: /etc/ringpromoter
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: ring-promoter-config
