# API token (bearer) and database connection string.
# Replace the placeholder values before applying. For real clusters prefer a
# sealed-secret / external secret manager over committing this file.
apiVersion: v1
kind: Secret
metadata:
  name: ring-promoter
  namespace: ring-system
type: Opaque
stringData:
  # Bearer token required on every /api request.
  RP_API_TOKEN: "change-me-to-a-long-random-token"
  # Postgres DSN. Point this at your Postgres instance.
  RP_DB_DSN: "postgres://ringpromoter:change-me@postgres.ring-system.svc.cluster.local:5432/ringpromoter?sslmode=disable"
  # GitHub API token used by the per-app "github" deployer (e.g. wslproxy) to
  # dispatch its CI/CD workflow and read run status. Needs `actions:write` +
  # `contents:read` on the target repo (a fine-grained PAT or GitHub App token).
  # Only required when an app uses `deployer: github`; leave as-is otherwise.
  RP_GITHUB_TOKEN: "change-me-github-token-with-actions-write"
  # Extra password required to deploy anything to the LAST ring (production):
  # promoting into it, seeding it directly, or enabling auto-promote into it.
  # Optional — omit the key entirely to disable the protection.
  RP_PROD_PASSWORD: "change-me-production-password"
  # Shared secret signing the HS256 JWT sent (as x-api-key) to the Ollama
  # server for AI diagnosis of failed jobs. Must match the secret configured on
  # the Ollama auth gateway. Optional — omit to disable AI diagnosis.
  RP_OLLAMA_JWT_SECRET: "change-me-ollama-gateway-secret"
