# API token (bearer) and database connection string for the WORKSTATION
# instance.
#
# PLACEHOLDER — fake values, committed for reference only. CI NEVER applies this
# file, and real secret values must never be committed. The real Secret is
# created by hand (see docs) and the deploy workflow preflights it: if it is
# missing the deploy fails with a clear error instead of crash-looping a pod.
#
# For real clusters prefer a sealed-secret / external secret manager over a
# hand-created Secret.
apiVersion: v1
kind: Secret
metadata:
  name: ring-promoter
  namespace: workstation-ring-promoter
type: Opaque
stringData:
  # Bearer token required on every /api request.
  RP_API_TOKEN: "change-me-to-a-long-random-token"
  # Postgres DSN. The workstation instance has its OWN database and role
  # (ringpromoter_ws) on the shared ring-promoter-db Postgres, which lives in
  # the ring-system namespace — hence the cross-namespace service DNS name.
  RP_DB_DSN: "postgres://ringpromoter_ws:change-me@ring-promoter-db.ring-system.svc.cluster.local:5432/ringpromoter_ws?sslmode=require"
  # GitHub API token used by the per-app "github" deployer to dispatch a CI/CD
  # workflow and read run status. Needs `actions:write` + `contents:read` on the
  # target repo (a fine-grained PAT or GitHub App token). NOT NEEDED YET: the
  # workstation instance has no real applications, only the inert `sample`
  # placeholder, so the real Secret omits this key entirely. Add it when a
  # workstation app uses `deployer: github`.
  # RP_GITHUB_TOKEN: "change-me-github-token-with-actions-write"
  # Extra password required to deploy anything to the LAST ring (production):
  # promoting into it, seeding it directly, or enabling auto-promote into it.
  # Optional — omit the key entirely to disable the protection.
  # RP_PROD_PASSWORD: "change-me-production-password"
  # Shared secret signing the HS256 JWT sent (as x-api-key) to the Ollama
  # server for AI diagnosis of failed jobs. Must match the secret configured on
  # the Ollama auth gateway. Shipped COMMENTED OUT on purpose: any non-empty
  # value (even a placeholder) enables the feature — the UI would show the
  # "Diagnose with AI" button and every click would fail at the gateway with
  # 401. Uncomment with the real secret to enable.
  # RP_OLLAMA_JWT_SECRET: "the-real-ollama-gateway-secret"
