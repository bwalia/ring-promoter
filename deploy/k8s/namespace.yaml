# The control-plane namespace for the workstation Ring Promoter instance.
#
# This repo deploys the WORKSTATION instance only. The diytaxreturn instance
# (namespace ring-system, ring-promoter.diytaxreturn.co.uk) is deployed from
# the diy-tax-return-uk repo — see devops/ring-promoter/ there.
#
# The shared ring namespaces (int/test/acc/prod) and the cluster-scoped
# ClusterRole ring-promoter-deployer are deliberately NOT defined here: they
# are cluster-wide and owned by the diy-tax-return-uk copy alone, so the two
# repos cannot overwrite each other. Workstation gets its own ring namespaces
# and RBAC when it has real applications to deploy.
apiVersion: v1
kind: Namespace
metadata:
  name: workstation-ring-promoter
  labels:
    app.kubernetes.io/name: ring-promoter
