# The control-plane namespace for the Ring Promoter service itself.
apiVersion: v1
kind: Namespace
metadata:
  name: ring-system
  labels:
    app.kubernetes.io/name: ring-promoter
---
# Ring namespaces that host the managed applications. Create them here if they
# do not already exist. ADDING A RING: add its namespace here and a matching
# RoleBinding in rbac.yaml.
apiVersion: v1
kind: Namespace
metadata:
  name: int
---
apiVersion: v1
kind: Namespace
metadata:
  name: test
---
apiVersion: v1
kind: Namespace
metadata:
  name: acc
---
apiVersion: v1
kind: Namespace
metadata:
  name: prod
---
# Namespace where the k8sjob deployer runs its execution Jobs (one Job per
# seed/promote/rollback). Kept separate from the ring namespaces so deploy
# scripts and application workloads never share a blast radius.
apiVersion: v1
kind: Namespace
metadata:
  name: ring-exec
  labels:
    app.kubernetes.io/name: ring-promoter
