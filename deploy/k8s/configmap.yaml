# Application registry + runtime settings, mounted at
# /etc/ringpromoter/config.yaml. Secrets (api_token, database.dsn, github token)
# are injected via environment variables from the Secret and omitted here.
#
# Rings are the shared pipeline int -> test -> acc -> prod (defined in
# internal/ring/ring.go). ADD AN APPLICATION: append to `apps` and re-apply this
# ConfigMap, then restart the deployment
# (kubectl rollout restart deploy/ring-promoter -n ring-system).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ring-promoter-config
  namespace: ring-system
data:
  config.yaml: |
    listen_addr: ":8080"
    deployer: log         # global default: sample k8s apps stay inert (no-op)
    health: http          # real HTTP health checks (needed for wslproxy gating)
    database:
      driver: postgres    # DSN comes from RP_DB_DSN (Secret)
    retry:
      count: 3
      delay: 5s
    # Bounds ONE seed/promote/rollback end-to-end — and an auto-promote chain
    # runs as a single operation, so a multi-hop chain of GitHub-workflow
    # deploys (each taking minutes) shares this budget.
    operation_timeout: 60m
    # AI failure diagnosis: "Diagnose with AI" on failed jobs sends the failure
    # logs to this Ollama server, which explains the cause and suggests fixes.
    # Active only when RP_OLLAMA_JWT_SECRET is also provided (Secret) — it signs
    # the HS256 JWT sent in the x-api-key header to the auth gateway.
    ollama:
      url: "https://ollama.workstation.co.uk"
      model: "qwen3-coder:30b"
    apps:
      # wslproxy — OpenResty/Lua app on VMs, deployed via its own GitHub Actions
      # per-environment workflow (deploy-single-environment.yml). Rings are the
      # real pipeline Integration -> Test -> Acceptance -> Production; target_env
      # is sent as the workflow ENV input (acc=pop0, prod=pop1). Do NOT point this
      # at deploy-wslproxy-delivery-pipeline.yml (cumulative cascade to prod).
      # Token from RP_GITHUB_TOKEN (Secret).
      - name: wslproxy
        deployer: github
        github:
          owner: bwalia
          repo: wslproxy
          workflow: deploy-single-environment.yml
          ref: main
          deploy_mode: full
          token_env: RP_GITHUB_TOKEN
          poll_interval: 20s
          run_lookup_timeout: 90s
        rings:
          int:  { target_env: int,  health_url: "https://int-our.wslproxy.com/healthz" }
          test: { target_env: test, health_url: "https://test.wslproxy.com/healthz" }
          acc:  { target_env: acc,  health_url: "https://prod-our-v1.wslproxy.com/healthz" }   # pop0
          # production = pop1. Public health endpoint on the wslproxy edge.
          prod: { target_env: prod, health_url: "https://pop1.diytaxreturn.co.uk/healthz" }     # pop1

      # diytaxreturn — Next.js + FastAPI/Lapis app on k3s (k3s0), deployed via its
      # own GitHub Actions single-env workflow (deploy-single-environment.yml).
      # Three environments only: int -> test -> acc (no prod ring configured).
      # STRATEGY: acceptance is deployed ONLY from the `release` branch. The acc
      # ring pins `ref: release`, so seed/promote to acc always deploys (and
      # records) release — "Promote -> acc" ships release while int/test carry
      # main. The workflow's guard job enforces the same rule as defence in depth.
      # Health = FastAPI /fastapi/health per env. Token from RP_GITHUB_TOKEN.
      - name: diytaxreturn
        deployer: github
        github:
          owner: bwalia
          repo: diy-tax-return-uk
          workflow: deploy-single-environment.yml
          ref: main            # branch hosting the workflow file (DEPLOY_BRANCH carries the version)
          deploy_mode: full
          token_env: RP_GITHUB_TOKEN
          poll_interval: 20s
          run_lookup_timeout: 120s
        rings:                 # target_env -> workflow ENV input
          int:  { target_env: int,  health_url: "https://int-api.diytaxreturn.co.uk/fastapi/health" }
          test: { target_env: test, health_url: "https://test-api.diytaxreturn.co.uk/fastapi/health" }
          acc:  { target_env: acc,  ref: release, health_url: "https://acc-api.diytaxreturn.co.uk/fastapi/health" }
          # No prod ring: this app has three environments (int/test/acc) only.

      # spectoncr — in-cluster container registry. Its Helm chart lives in the
      # diy-tax-return-uk repo and is deployed by THAT repo's own GitHub Actions
      # workflow deploy-spectoncr.yml (a helm upgrade --install per environment).
      # Unlike wslproxy/diytaxreturn, that workflow has NO version/branch input:
      # it always deploys the chart at its own ref (main) to TARGET_ENV. So we
      # OMIT the version and mode inputs (the "-" sentinel — GitHub 422s on any
      # undeclared input) and send only TARGET_ENV plus FORCE=true. FORCE bypasses
      # the workflow's "already healthy → skip" preflight so every seed/promote
      # actually re-applies the chart (spectoncr has no version to promote; a
      # promote here means "(re)deploy the current chart to the next env").
      # Token from RP_GITHUB_TOKEN (same repo/token as diytaxreturn).
      - name: spectoncr
        deployer: github
        github:
          owner: bwalia
          repo: diy-tax-return-uk
          workflow: deploy-spectoncr.yml
          ref: main
          token_env: RP_GITHUB_TOKEN
          env_input: TARGET_ENV     # ring target_env -> workflow TARGET_ENV input
          version_input: "-"        # workflow declares no version input — omit
          mode_input: "-"           # workflow declares no DEPLOY_MODE input — omit
          extra_inputs:
            FORCE: "true"           # force the helm upgrade past the healthy-skip preflight
          poll_interval: 20s
          run_lookup_timeout: 120s
        # Health: the registry edge enforces basic-auth, so a healthy spectoncr
        # answers GET /v2/ with 401 (auth required) — the exact signal
        # deploy-spectoncr.yml asserts post-deploy. health_expect_status: 401
        # makes the checker treat that 401 (not 2xx) as healthy; anything else
        # (000/404/502) is unhealthy. /v2/ is exposed on every env.
        rings:                      # target_env -> workflow TARGET_ENV input
          int:  { target_env: int,  health_url: "https://int-spectoncr.diytaxreturn.co.uk/v2/",  health_expect_status: 401 }
          test: { target_env: test, health_url: "https://test-spectoncr.diytaxreturn.co.uk/v2/", health_expect_status: 401 }
          acc:  { target_env: acc,  health_url: "https://acc-spectoncr.diytaxreturn.co.uk/v2/",  health_expect_status: 401 }
          prod: { target_env: prod, health_url: "https://spectoncr.diytaxreturn.co.uk/v2/",      health_expect_status: 401 }
