# Application registry + runtime settings, mounted at
# /etc/ringpromoter/config.yaml. Secrets (api_token, database.dsn, github token)
# are injected via environment variables from the Secret and omitted here.
#
# Rings are the shared pipeline int -> test -> acc -> prod (defined in
# internal/ring/ring.go). ADD AN APPLICATION: append to `apps` and re-apply this
# ConfigMap, then restart the deployment
# (kubectl rollout restart deploy/ring-promoter -n ring-system).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ring-promoter-config
  namespace: ring-system
data:
  config.yaml: |
    listen_addr: ":8080"
    deployer: log         # global default: sample k8s apps stay inert (no-op)
    health: http          # real HTTP health checks (needed for wslproxy gating)
    database:
      driver: postgres    # DSN comes from RP_DB_DSN (Secret)
    retry:
      count: 3
      delay: 5s
    operation_timeout: 30m
    apps:
      - name: web-frontend
        rings:
          int:  { namespace: int,  deployment: web-frontend, container: web, image: registry.example.com/web-frontend, health_url: "http://web-frontend.int.svc.cluster.local/health" }
          test: { namespace: test, deployment: web-frontend, container: web, image: registry.example.com/web-frontend, health_url: "http://web-frontend.test.svc.cluster.local/health" }
          acc:  { namespace: acc,  deployment: web-frontend, container: web, image: registry.example.com/web-frontend, health_url: "http://web-frontend.acc.svc.cluster.local/health" }
          prod: { namespace: prod, deployment: web-frontend, container: web, image: registry.example.com/web-frontend, health_url: "http://web-frontend.prod.svc.cluster.local/health" }
      - name: orders-api
        rings:
          int:  { namespace: int,  deployment: orders-api, container: api, image: registry.example.com/orders-api, health_url: "http://orders-api.int.svc.cluster.local/health" }
          test: { namespace: test, deployment: orders-api, container: api, image: registry.example.com/orders-api, health_url: "http://orders-api.test.svc.cluster.local/health" }

      # wslproxy — OpenResty/Lua app on VMs, deployed via its own GitHub Actions
      # per-environment workflow (deploy-single-environment.yml). Rings are the
      # real pipeline Integration -> Test -> Acceptance -> Production; target_env
      # is sent as the workflow ENV input (acc=pop0, prod=pop1). Do NOT point this
      # at deploy-wslproxy-delivery-pipeline.yml (cumulative cascade to prod).
      # Token from RP_GITHUB_TOKEN (Secret).
      - name: wslproxy
        deployer: github
        github:
          owner: bwalia
          repo: wslproxy
          workflow: deploy-single-environment.yml
          ref: main
          deploy_mode: full
          token_env: RP_GITHUB_TOKEN
          poll_interval: 20s
          run_lookup_timeout: 90s
        rings:
          int:  { target_env: int,  health_url: "https://int-our.wslproxy.com/healthz" }
          test: { target_env: test, health_url: "https://test.wslproxy.com/healthz" }
          acc:  { target_env: acc,  health_url: "https://prod-our-v1.wslproxy.com/healthz" }   # pop0
          # production = pop1 (18.133.126.242). Public health hostname pending;
          # using the IP endpoint the workflow itself checks in the interim.
          prod: { target_env: prod, health_url: "http://18.133.126.242:7691/healthz" }         # pop1
