# The Ring Promoter control-plane service.
#
# replicas is 1 by recommendation (simplest reasoning). It is not a hard
# correctness requirement with the Postgres store: promotion operations are
# serialized via a Postgres *session advisory lock*, so even an accidental
# scale-up cannot run two concurrent promotions on the same application. Do NOT
# attach an HPA. State/history live in Postgres and survive restarts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ring-promoter
  namespace: ring-system
  labels:
    app: ring-promoter
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ring-promoter
  template:
    metadata:
      labels:
        app: ring-promoter
      annotations:
        # Roll the pod when the config changes: bump this or use
        # `kubectl rollout restart`.
        ring-promoter/config-revision: "1"
    spec:
      serviceAccountName: ring-promoter
      securityContext:
        runAsNonRoot: true
        # The distroless :nonroot image's user is the NAME "nonroot"; Kubernetes
        # cannot verify a non-numeric user against runAsNonRoot, so pin the
        # distroless nonroot UID/GID (65532) numerically or the container fails
        # to start with CreateContainerConfigError.
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ring-promoter
          image: docker.io/bwalia/ring-promoter:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: RP_CONFIG_FILE
              value: /etc/ringpromoter/config.yaml
            - name: RP_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ring-promoter
                  key: RP_API_TOKEN
            - name: RP_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: ring-promoter
                  key: RP_DB_DSN
            # Token used by the per-app "github" deployer (e.g. wslproxy) to
            # dispatch its CI/CD workflow. Optional: only required if an app in
            # the ConfigMap uses `deployer: github`. Marked optional so clusters
            # with only Kubernetes apps need not provide it.
            - name: RP_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ring-promoter
                  key: RP_GITHUB_TOKEN
                  optional: true
            # Extra password gating deployments to the last ring (production).
            # Optional: without the Secret key, prod deploys need no password.
            - name: RP_PROD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ring-promoter
                  key: RP_PROD_PASSWORD
                  optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /etc/ringpromoter
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: ring-promoter-config
